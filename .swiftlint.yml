included:
  - App/Sources
  - Modules

excluded:
  - Modules/**/Tests
  - .build
  - Derived
  - DerivedData
  - "**/*.xcodeproj"
  - "**/*.xcworkspace"

reporter: "xcode"

disabled_rules:
  - todo
  - line_length

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_imports
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces

identifier_name:
  min_length: 2
  excluded:
    - id

type_name:
  min_length: 3

force_cast: error
force_try: error

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100
